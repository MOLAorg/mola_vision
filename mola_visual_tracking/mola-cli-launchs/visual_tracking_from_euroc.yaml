# -----------------------------------------------------------------------------
#                        MOLA system definition
# Demo: detect + track image features from the EuRoC MAV dataset (left camera,
# cam0) and show them in a MolaViz (ImGui) subwindow. No 3D reconstruction.
#
# Usage:
#   EUROC_BASE_DIR=/path/to/euroc \
#   EUROC_SEQ=vicon_room1/V1_01_easy/ \
#   mola-cli visual_tracking_from_euroc.yaml
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz (ImGui GUI)
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    params: ~

  # =====================
  # EuRoC dataset input
  # =====================
  - name: euroc_input
    type: mola::EurocDataset
    execution_rate: 50 # Hz
    params:
      base_dir: ${EUROC_BASE_DIR}
      sequence: ${EUROC_SEQ|vicon_room1/V1_01_easy/}
      time_warp_scale: ${MOLA_TIME_WARP|1.0}
      start_paused: ${MOLA_DATASET_START_PAUSED|false}

  # =====================
  # Feature tracking front-end (left camera, cam0)
  # =====================
  - name: tracker
    type: mola::VisualTracking
    raw_data_source: euroc_input
    execution_rate: 50 # Hz
    verbosity_level: "${MOLA_VERBOSITY|INFO}"
    params:
      sensor_label: cam0
      subwindow_title: Feature tracking (EuRoC cam0)
      win_pos: 10 60 800 600 # [x y width height]
      max_features: 400
      min_distance: 12.0
      redetect_below: 200
      lk_win_size: 21
      lk_max_levels: 3
      trail_length: 12
      apply_fmatrix: true
