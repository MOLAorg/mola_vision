# -----------------------------------------------------------------------------
#                        MOLA system definition
# Demo: detect + track image features from a VIDEO FILE and show them in a
# MolaViz (ImGui) subwindow. No 3D reconstruction.
#
# Usage:
#   VIDEO_FILE=/path/to/movie.mp4  mola-cli visual_tracking_from_video.yaml
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz (ImGui GUI)
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    params:
      imgui_app_name: visual_tracking_from_video

  # =====================
  # Video file input
  # =====================
  - name: video_input
    type: mola::VideoDataset
    execution_rate: ${VIDEO_RATE|30} # Hz
    params:
      input_mode: VideoFile
      video_uri: ${VIDEO_FILE}
      image_publish_rate: ${VIDEO_RATE|30.0}
      sensor_label: camera

  # =====================
  # Feature tracking front-end
  # =====================
  - name: tracker
    type: mola::VisualTracking
    raw_data_source: video_input
    execution_rate: 30 # Hz
    verbosity_level: "${MOLA_VERBOSITY|INFO}"
    params:
      sensor_label: camera
      subwindow_title: Feature tracking (video)
      win_pos: 10 60 800 600 # [x y width height]
      max_features: 400
      min_distance: 12.0
      redetect_below: 200
      lk_win_size: 21
      lk_max_levels: 3
      trail_length: 12
      apply_fmatrix: true
