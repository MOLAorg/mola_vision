# -----------------------------------------------------------------------------
#                        MOLA system definition
# Demo: detect + track image features from the KITTI odometry dataset (left
# grayscale camera, image_0) and show them in a MolaViz subwindow. No 3D
# reconstruction (this is the feature-tracking demo, not visual odometry).
#
# Usage:
#   KITTI_BASE_DIR=/path/to/kitti  KITTI_SEQ=00 \
#   mola-cli visual_tracking_from_kitti.yaml
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz (ImGui GUI)
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    params: ~

  # =====================
  # KITTI odometry dataset input (left camera only)
  # =====================
  - name: kitti_input
    type: mola::KittiOdometryDataset
    execution_rate: 20 # Hz
    params:
      base_dir: ${KITTI_BASE_DIR}
      sequence: ${KITTI_SEQ|00}
      time_warp_scale: ${MOLA_TIME_WARP|1.0}
      start_paused: ${MOLA_DATASET_START_PAUSED|false}
      publish_lidar: false
      publish_image_0: true
      publish_image_1: false
      publish_ground_truth: false

  # =====================
  # Feature tracking front-end (left camera, image_0)
  # =====================
  - name: tracker
    type: mola::VisualTracking
    raw_data_source: kitti_input
    execution_rate: 20 # Hz
    verbosity_level: "${MOLA_VERBOSITY|INFO}"
    params:
      sensor_label: image_0
      subwindow_title: Feature tracking (KITTI image_0)
      win_pos: 10 60 1000 350 # [x y width height]
      max_features: 500
      min_distance: 12.0
      redetect_below: 250
      lk_win_size: 21
      lk_max_levels: 3
      trail_length: 12
      apply_fmatrix: true
