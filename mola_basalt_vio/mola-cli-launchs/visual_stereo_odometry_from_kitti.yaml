# -----------------------------------------------------------------------------
#                        SLAM system definition for MOLA
# This file defines:
# - Input dataset from KITTI
# - Basalt-based visual odometry (stereo)
# - MolaViz for GUI
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz
  # =====================
  - name: viz
    type: mola::MolaViz
    verbosity_level: "${MOLA_VERBOSITY_MOLA_VIZ|INFO}"
    params: ~ # none

  # Offline or online sensory data sources =====================
  # =====================
  # KittiOdometryDataset
  # =====================
  - name: dataset_input
    type: mola::KittiOdometryDataset
    execution_rate: 20 # Hz
    #verbosity_level: INFO
    quit_mola_app_on_dataset_end: ${MOLA_QUIT_ON_DATASET_END|false}

    gui_preview_sensors:
      - raw_sensor_label: image_0
        decimation: 1
        win_pos: 5 370 600 200
      - raw_sensor_label: image_1
        decimation: 1
        win_pos: 5 600 600 200
    params:
      base_dir: ${KITTI_BASE_DIR}
      sequence: ${KITTI_SEQ}
      time_warp_scale: ${MOLA_TIME_WARP|1.0}
      start_paused: ${MOLA_DATASET_START_PAUSED|false}
      publish_lidar: false
      publish_image_0: true
      publish_image_1: true
      publish_ground_truth: true

  - name: vi_odom
    type: mola::VisualInertialOdometry
    verbosity_level: "${MOLA_VERBOSITY_MOLA_VIO|INFO}"
    raw_data_source: "dataset_input"
    # This includes here a whole block "params: (...)"
    # with the LIDAR-Odometry pipeline configuration:
    #params: "${MOLA_ODOMETRY_PIPELINE_YAML|../pipelines/vio-default.yaml}"
    params:
      # List of sensor labels or regex's to be matched to input observations
      # to be used as camera image observations. Monocular systems will have only one entry, stereo
      # two camera labels. More than 2 are also supported by Basalt.
      camera_sensor_labels: [image_0, image_1]
      imu_sensor_label: "imu"

      # Use Visual Inertial Odometry (VIO) (true) or Visual Odometry (VO) (false)
      use_imu: false

      #visualization:
