# -----------------------------------------------------------------------------
#                        MOLA system definition
# Stereo visual SLAM (mola::VisualSlam, mode=stereo) from the KITTI odometry
# dataset (rectified grayscale pair image_0 / image_1). Depth comes from the
# stereo match, so the trajectory and map are at TRUE metric scale.
#
# Usage:
#   KITTI_BASE_DIR=/path/to/kitti   KITTI_SEQ=00 \
#   mola-cli visual_slam_stereo_from_kitti.yaml
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz (ImGui GUI)
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    params: ~

  # =====================
  # KITTI odometry dataset (publishes image_0 + image_1)
  # =====================
  - name: kitti_input
    type: mola::KittiOdometryDataset
    execution_rate: 20 # Hz
    params:
      base_dir: ${KITTI_BASE_DIR}
      sequence: ${KITTI_SEQ|00}
      time_warp_scale: ${MOLA_TIME_WARP|1.0}
      start_paused: ${MOLA_DATASET_START_PAUSED|false}
      publish_lidar: false
      publish_image_0: true
      publish_image_1: true
      publish_ground_truth: true

  # =====================
  # Stereo visual SLAM front-end
  # =====================
  - name: visual_slam
    type: mola::VisualSlam
    raw_data_source: kitti_input
    execution_rate: 20 # Hz
    verbosity_level: "${MOLA_VERBOSITY|INFO}"
    params:
      mode: stereo
      left_label: image_0
      right_label: image_1
      # KITTI baseline ~0.54 m (P1 = -fx*baseline). Per-sequence fx differs but
      # the physical baseline is ~constant.
      stereo_baseline: ${KITTI_STEREO_BASELINE|0.537}
      max_features: 500
      min_distance: 12.0
      redetect_below: 200
      lk_win_size: 21
      lk_max_levels: 3
      min_pnp_points: 12
      kf_max_frames_gap: 10
      kf_min_frames_gap: 2
      kf_min_tracked: 120
      kf_min_tracked_ratio: 0.6
      kf_min_parallax_px: 18.0
      publish_viz_2d: true
      publish_viz_3d: true
      viz2d_title: Visual SLAM (stereo, KITTI)
      viz2d_win_pos: 10 60 1000 350 # [x y width height]
