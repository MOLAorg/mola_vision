# -----------------------------------------------------------------------------
#                        MOLA system definition
# RGB-D visual SLAM (mola::RgbdSlam) from a rawlog containing registered
# CObservation3DRangeScan observations (e.g. a RealSense D435/D455 recording,
# or a TUM RGB-D sequence converted to .rawlog).
#
# Usage:
#   RGBD_RAWLOG=/path/to/sequence.rawlog \
#   RGBD_SENSOR_LABEL=CAMERA1 \
#   mola-cli rgbd_slam_from_rawlog.yaml
# -----------------------------------------------------------------------------

modules:
  # =====================
  # MolaViz (ImGui GUI)
  # =====================
  - name: viz
    type: ${MOLA_GUI_MODULE|mola::MolaVizImGui}
    params: ~

  # =====================
  # Rawlog dataset input
  # =====================
  - name: rawlog_input
    type: mola::RawlogDataset
    execution_rate: 30 # Hz
    params:
      rawlog_filename: ${RGBD_RAWLOG}
      time_warp_scale: ${MOLA_TIME_WARP|1.0}
      start_paused: ${MOLA_DATASET_START_PAUSED|false}

  # =====================
  # RGB-D SLAM front-end
  # =====================
  - name: rgbd_slam
    type: mola::RgbdSlam
    raw_data_source: rawlog_input
    execution_rate: 30 # Hz
    verbosity_level: "${MOLA_VERBOSITY|INFO}"
    params:
      sensor_label: ${RGBD_SENSOR_LABEL|CAMERA1}
      max_features: 400
      min_distance: 12.0
      redetect_below: 150
      lk_win_size: 21
      lk_max_levels: 3
      min_pnp_points: 12
      min_depth: 0.2
      max_depth: 8.0
      ba_window_size: 8
      kf_max_frames_gap: 20
      kf_min_frames_gap: 2
      kf_min_tracked: 80
      kf_min_tracked_ratio: 0.6
      kf_min_parallax_px: 18.0
      # 2D feature-overlay subwindow in MolaViz:
      publish_viz_2d: true
      viz2d_title: RGB-D SLAM tracking
      viz2d_win_pos: 10 60 800 600 # [x y width height]
